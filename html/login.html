<!DOCTYPE html>
<html lang="fr">

<head>

  <link rel="stylesheet" href="../css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    
    #menuDialog {
      z-index: 1;
      display: none;
    }

    .signup-text a {
      color: #bbb;
      text-decoration: none;
      cursor: pointer;
    }

    .signup-text a:hover {
      color: #fff;
    }
  </style>
</head>

<body>
  <!-- HEADER -->
    <div class="header">
        <div class="sides">
            
        </div>

        <nav class="header-nav">
            <a href="../html/index.html">Accueil</a>
            <a href="../html/dashboard.html">Tableau</a>
            <a href="../html/organigramme.html">Organigramme formel</a>
            <a href="../html/admin_view.html">Listes de graphiques</a>
            <a href="../html/test_graph.html">Graphique informel</a>
        </nav>
    </div>

  <!-- FORMULAIRE DE CONNEXION -->
  <div class="login-container">
    <div class="login-box">
      <h2>Connexion</h2>

      <form id="login-form" method="post">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="input-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required />
        </div>

        <button type="submit" class="btn">Se connecter</button>

        
        <p class="signup-text">
          Pas encore de compte ?
          <a href="signup.html">S'inscrire</a>
        </p>
      </form>
    </div>
  </div>

      </nav>
    </div>
  </footer>

  <script src="../js/login.js"></script>
