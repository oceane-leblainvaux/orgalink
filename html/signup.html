    <link rel="stylesheet" href="../css/signup.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="sides">
            <div id="authButtons" class="login-icon"></div>
        </div>

        <nav class="header-nav">
            <a href="../html/index.html">Accueil</a>
            <a href="../html/dashboard.html">Tableau</a>
            <a href="../html/organigramme.html">Organigramme formel</a>
            <a href="../html/admin_view.html">Listes de graphiques</a>
            <a href="../html/test_graph.html">Graphique informel</a>
        </nav>
    </div>
    
    <!-- FORMULAIRE D'INSCRIPTION -->
    <div class="signup-container">
        <div class="signup-box">
            <h2>Inscription</h2>

            <form action="../php/signup.php" method="POST">
                <div class="input-group">
                    <label for="firstname">Prénom</label>
                    <input type="text" id="firstname" name="firstname" required>
                </div>

                <div class="input-group">
                    <label for="lastname">Nom</label>
                    <input type="text" id="lastname" name="lastname" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="input-group password-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required>
                    <span class="toggle-password" onclick="togglePassword('password')">👁</span>
                </div>

                <div class="input-group password-group">
                    <label for="confirm_password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                    <span class="toggle-password" onclick="togglePassword('confirm_password')">👁</span>
                </div>
                
                <div class="input-group">
                    <label for="role">Rôle</label>
                    <select id="role" name="role" required>
                        <option value="eleve">Élève</option> 
                        <option value="prof">Professeur</option> 
                    </select>
                </div>
                
                <button type="submit" name="submit" class="btn">S'inscrire</button>

                <p class="login-text">Déjà un compte ? <a href="../html/login.html">Se connecter</a></p>
            </form>
        </div>
    </div>
    
    <!-- MENU DÉROULANT -->
    <dialog id="menuDialog">
        <a href="../html/index.html">Accueil</a>
        <a href="#">Tableau</a>
        <a href="#">Organigramme</a>
    </dialog>

                <a href="../html/about.html">À propos de nous</a> |
                <a href="#">Mentions Légales</a> |
                <a href="../html/contact.html">Contact</a>
            </nav>
        </div>
    </footer>

    <script src="../js/signup.js"></script>

</body>

</html>
